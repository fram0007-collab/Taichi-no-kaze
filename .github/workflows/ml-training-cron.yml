name: ML Model Training

# Trains the risk-prediction model from current database history and commits
# the resulting artifact into frontend/api/ml_models/. That commit triggers
# Vercel's normal git-integration deploy, so the serving endpoint
# (frontend/api/predict_zone_risk.py) picks up the new model automatically —
# no separate serving infrastructure needed.
#
# Required repo secret:
#   DATABASE_URL   same value as worker/.env's DATABASE_URL (sync driver, no +asyncpg)
#
# Runs daily by default — training more often than your data actually changes
# meaningfully just wastes Action minutes. Adjust the cron below if you want
# a different cadence once you have a feel for how fast risk_alerts accumulate.

on:
  schedule:
    - cron: "0 20 * * *"  # 03:00 WIB (UTC+7) daily — off-peak
  workflow_dispatch: {}    # manual trigger from the Actions tab

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write  # needed to commit the trained model back to the repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: ml-service/requirements.txt

      - name: Install dependencies
        run: pip install -r ml-service/requirements.txt

      - name: Create ml-service .env
        run: |
          cat > ml-service/.env << EOF
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          EOF

      - name: Train early-warning model
        id: train
        working-directory: ml-service
        run: |
          python train.py
        continue-on-error: true  # e.g. "not enough data yet" shouldn't fail the whole workflow

      - name: Train resolution-time model
        id: train_resolution
        working-directory: ml-service
        run: |
          python train_resolution.py
        continue-on-error: true  # separate data requirement (closed alerts w/ resolved_at) — often ready later than the early-warning model

      - name: Copy artifacts into frontend/api (whichever training succeeded)
        run: |
          mkdir -p frontend/api/ml_models
          if [ "${{ steps.train.outcome }}" = "success" ]; then
            cp ml-service/models/risk_predictor.joblib frontend/api/ml_models/risk_predictor.joblib
          fi
          if [ "${{ steps.train_resolution.outcome }}" = "success" ]; then
            cp ml-service/models/resolution_predictor.joblib frontend/api/ml_models/resolution_predictor.joblib
          fi

      - name: Commit and push updated models
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/api/ml_models/risk_predictor.joblib frontend/api/ml_models/resolution_predictor.joblib 2>/dev/null || true
          git diff --staged --quiet && echo "No model changes, skipping commit" || \
            git commit -m "chore: retrain risk-prediction models [skip ci]"
          git push

      - name: Warn if either training was skipped
        if: steps.train.outcome != 'success' || steps.train_resolution.outcome != 'success'
        run: |
          echo "::warning::Early-warning training outcome: ${{ steps.train.outcome }}"
          echo "::warning::Resolution-time training outcome: ${{ steps.train_resolution.outcome }}"
          echo "::warning::Any model that failed/was skipped keeps its previous version (or stays untrained) in production."
